[package]
name = "maple-store"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "MAPLE local package store - content-addressed storage for packages, blobs, and manifests"
rust-version.workspace = true

[dependencies]
maple-package = { path = "../maple-package" }
maple-package-format = { path = "../maple-package-format" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
thiserror = "2"
walkdir = "2"
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["full", "test-util"] }
