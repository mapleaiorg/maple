[package]
name = "maple-package-format"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "MAPLE package OCI layer format and content addressing"
rust-version.workspace = true

[dependencies]
maple-crypto = { path = "../maple/crypto" }
maple-package = { path = "../maple-package" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
blake3 = "1"
tar = "0.4"
flate2 = "1"
sha2 = "0.10"
thiserror = "2"
chrono = { version = "0.4", features = ["serde"] }
tempfile = "3"
walkdir = "2"
tracing = "0.1"

[dev-dependencies]
tempfile = "3"
