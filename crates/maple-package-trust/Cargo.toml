[package]
name = "maple-package-trust"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "MAPLE package signing, verification, SBOM generation, and build attestation"
rust-version.workspace = true

[dependencies]
maple-crypto = { path = "../maple/crypto" }
maple-package = { path = "../maple-package" }
maple-package-format = { path = "../maple-package-format" }
maple-build = { path = "../maple-build" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ed25519-dalek = { version = "2", features = ["serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2"
base64 = "0.22"

[dev-dependencies]
tempfile = "3"
rand = "0.8"
semver = "1"
