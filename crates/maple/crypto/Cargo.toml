[package]
name = "maple-crypto"
version = "0.1.0"
edition = "2021"
description = "Cryptographic primitives for MAPLE: Ed25519 key pairs, BLAKE3 hashing, signatures"
license = "MIT OR Apache-2.0"
repository = "https://github.com/mapleaiorg/maple"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
blake3 = "1"
ed25519-dalek = { version = "2", features = ["serde"] }
rand = "0.8"
thiserror = "2"
zeroize = { version = "1", features = ["derive"] }

[dev-dependencies]
proptest = "1"
